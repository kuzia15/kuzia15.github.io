<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="keywords" content="kuzia, kuzia15, site kuzia15">
<title>Hello, World! I`m kuzia15</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  background: #0a001f;
  color: #eee;
  font-family: 'Share Tech Mono', monospace;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  background: radial-gradient(ellipse at center, #150031 0%, #0a001f 80%);
  overflow-x: hidden;
}

/* banner fix */
.banner-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.banner {
  width: 500px;
  max-width: 90vw;
  height: auto;
  display: block;
}

/* lang */
.lang-switcher {
  align-self: flex-end;
  margin-bottom: 15px;
}

.lang-switcher button {
  background: none;
  border: 1.5px solid #ff00a8;
  color: #ff00a8;
  padding: 6px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-weight: 600;
  cursor: pointer;
  border-radius: 30px;
  margin-left: 10px;
}

.lang-switcher button.active,
.lang-switcher button:hover {
  background: #ff00a8;
  color: #0a001f;
}

/* header */
header {
  font-family: 'Orbitron', sans-serif;
  font-size: 4rem;
  font-weight: 700;
  color: #ff00a8;
  text-transform: uppercase;
  position: relative;
  margin-bottom: 10px;
  letter-spacing: 0.15em;
  user-select: none;
}

header::before,
header::after {
  content: 'kuzia15';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  color: #ff00a8;
  clip-path: polygon(0 0,100% 0,100% 45%,0 45%);
  animation: glitchTop 2s infinite linear alternate-reverse;
}

header::after {
  clip-path: polygon(0 55%,100% 55%,100% 100%,0 100%);
  animation: glitchBottom 2s infinite linear alternate-reverse;
  color: #00ffe7;
}

@keyframes glitchTop {
  0% { transform: translate(0); }
  50% { transform: translate(-3px, 2px); }
  100% { transform: translate(0); }
}

@keyframes glitchBottom {
  0% { transform: translate(0); }
  50% { transform: translate(3px, -2px); }
  100% { transform: translate(0); }
}

/* nav */
nav {
  width: 100%;
  max-width: 800px;
  background: rgba(20, 0, 40, 0.7);
  padding: 15px 25px;
  margin-bottom: 50px;
  border-radius: 12px;
  box-shadow: 0 0 12px #ff00a8, 0 0 35px #00ffe7;
  display: flex;
  justify-content: center;
  gap: 40px;
  font-weight: 600;
  text-transform: uppercase;
}

nav a {
  color: #ff00a8;
  text-decoration: none;
  position: relative;
  padding: 6px 0;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0%;
  height: 3px;
  background: linear-gradient(90deg, #ff00a8, #00ffe7);
  transition: width 0.35s ease;
}

nav a:hover::after {
  width: 100%;
}

/* mobile */
@media (max-width: 650px) {
  header {
    font-size: 2.8rem;
  }
  nav {
    gap: 25px;
    padding: 12px 20px;
  }
  .lang-switcher {
    align-self: center;
  }
}
</style>
</head>

<body>

<div class="lang-switcher">
  <button class="active">EN</button>
  <button>RU</button>
</div>

<header>kuzia15</header>

<div class="banner-wrap">
  <a href="https://browser.yandex.ru/download?partner_id=831050&banerid=1314219622"
     target="_blank" rel="noopener">
    <img src="banner-mobile.png" class="banner" alt="Yandex Browser">
  </a>
</div>

<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#stats">Stats</a>
  <a href="#contacts">Contacts</a>
</nav>

</body>
  </html>
